
<!DOCTYPE html>
<html>
<head>
<title>The Great Discovery Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1>The Great Discovery Engine</h1>
<p>Discovery pressure over iterations</p>

<canvas id="pressureChart"></canvas>

<script>
const ctx = document.getElementById('pressureChart');

new Chart(ctx, {
type: 'line',
data: {
labels: ['1','2','3','4','5','6'],
datasets: [{
label: 'Discovery Pressure',
data: [1,3,2,5,4,7]
}]
}
});
</script>

</body>
</html>
